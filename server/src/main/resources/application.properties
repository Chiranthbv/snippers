# Application
spring.application.name=CodeSnippers
server.port=${PORT:8081}

# ─── Supabase PostgreSQL ───────────────────────────────────────
# Replace the placeholder below with your actual database password
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.mitmnsstlifkfzxvrwsn
spring.datasource.password=Chiranth_11
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (recommended for Supabase)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=-1

# ─── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# ─── JWT ───────────────────────────────────────────────────────
app.jwt.secret=CodeSnippersSecretKeyForJWTTokenGeneration2026MustBeAtLeast256Bits
app.jwt.expiration=86400000

# ─── CORS ──────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# ─── Scheduled tasks ──────────────────────────────────────────
spring.task.scheduling.pool.size=2
